name: Pre-render

on:
  push:
    branches:
      - master
    paths:
      - "posts/**"
  workflow_dispatch:

jobs:
  pre-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Collect post metadata
        id: collect
        run: |
          POSTS_META_FILE=$(mktemp)

          for filepath in posts/*.md; do
            [ -f "$filepath" ] || continue

            slug=$(basename "$filepath" .md)

            frontmatter=$(awk '/^---$/{if(found){exit}else{found=1;next}} found{print}' "$filepath")

            title=$(echo "$frontmatter" | grep '^title:' | sed 's/^title: *//; s/^"//; s/"$//')
            date=$(echo "$frontmatter" | grep '^date:' | sed 's/^date: *//; s/^"//; s/"$//')
            edited=$(echo "$frontmatter" | grep '^edited:' | sed 's/^edited: *//; s/^"//; s/"$//')
            lang=$(echo "$frontmatter" | grep '^lang:' | sed 's/^lang: *//; s/^"//; s/"$//')

            tags_raw=$(echo "$frontmatter" | grep '^tags:' | sed 's/^tags: *//')
            tags_json=$(echo "$tags_raw" | sed 's/\[//; s/\]//; s/"//g; s/ //g' | \
              awk -F',' '{for(i=1;i<=NF;i++) printf "\"%s\"%s",$i,(i<NF?",":"")}' | \
              sed 's/^/[/; s/$/]/')

            authors_raw=$(echo "$frontmatter" | grep '^author:' | sed 's/^author: *//')
            authors_json=$(echo "$authors_raw" | sed 's/\[//; s/\]//; s/"//g' | \
              awk -F',' '{for(i=1;i<=NF;i++){gsub(/^ +| +$/,"",$i); printf "\"%s\"%s",$i,(i<NF?",":"")}}' | \
              sed 's/^/[/; s/$/]/')

            echo "${slug}|${title}|${date}|${edited}|${tags_json}|${lang}|${authors_json}" >> "$POSTS_META_FILE"
          done

          echo "POSTS_META_FILE=$POSTS_META_FILE" >> "$GITHUB_ENV"

      - name: Parse supported languages from languages.js
        id: langs
        run: |
          LANGS=$(grep -oP '\b[a-z]{2}(?=\s*:)' languages.js | tr '\n' ' ')
          echo "LANGS=$LANGS" >> "$GITHUB_ENV"

      - name: Generate RSS feeds
        run: |
          BASE_URL="https://www.dohan.in"
          NOW=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")

          mkdir -p rss

          for lang_code in $LANGS; do
            rss_block=$(awk "/^\s*${lang_code}\s*:/{found=1} found && /rss\s*:/{rss=1} rss && /title\s*:/{print;count++} rss && /description\s*:/{print;count++} count==2{exit}" languages.js)

            rss_title=$(echo "$rss_block" | grep 'title' | head -1 | sed 's/.*title[^"]*"//; s/".*//')
            rss_desc=$(echo "$rss_block" | grep 'description' | head -1 | sed 's/.*description[^"]*"//; s/".*//')

            {
              printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
              printf '%s\n' '<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">'
              printf '%s\n' '  <channel>'
              printf '    <title>%s</title>\n' "${rss_title}"
              printf '    <link>%s</link>\n' "${BASE_URL}"
              printf '    <description>%s</description>\n' "${rss_desc}"
              printf '    <language>%s</language>\n' "${lang_code}"
              printf '    <lastBuildDate>%s</lastBuildDate>\n' "${NOW}"
              printf '    <atom:link href="%s/rss/%s.xml" rel="self" type="application/rss+xml"/>\n' "${BASE_URL}" "${lang_code}"
            } > "rss/${lang_code}.xml"

            while IFS='|' read -r slug title date edited tags_json post_lang authors_json; do
              [ "$post_lang" = "$lang_code" ] || continue

              post_url="${BASE_URL}/posts?p=${slug}"
              pub_date=$(date -u -d "${date}" +"%a, %d %b %Y %H:%M:%S GMT" 2>/dev/null || echo "$NOW")

              content=$(awk 'BEGIN{c=0} /^---$/{c++;next} c>=2{print}' "posts/${slug}.md" | \
                sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

              {
                printf '%s\n' '    <item>'
                printf '      <title>%s</title>\n' "${title}"
                printf '      <link>%s</link>\n' "${post_url}"
                printf '      <guid isPermaLink="true">%s</guid>\n' "${post_url}"
                printf '      <pubDate>%s</pubDate>\n' "${pub_date}"
                printf '      <description><![CDATA[%s]]></description>\n' "${content}"
                printf '%s\n' '    </item>'
              } >> "rss/${lang_code}.xml"

            done < "$POSTS_META_FILE"

            {
              printf '%s\n' '  </channel>'
              printf '%s\n' '</rss>'
            } >> "rss/${lang_code}.xml"

            echo "Generated rss/${lang_code}.xml"
          done

      - name: Generate posts.json
        run: |
          BASE_URL="https://www.dohan.in"
          FIRST=1
          printf '[' > posts.json

          while IFS='|' read -r slug title date edited tags_json lang_code authors_json; do
            post_url="${BASE_URL}/posts?p=${slug}"
            [ $FIRST -eq 1 ] && FIRST=0 || printf ',' >> posts.json
            printf '{"slug":"%s","title":"%s","date":"%s","edited":"%s","tags":%s,"lang":"%s","author":%s,"url":"%s"}\n' \
              "${slug}" "${title}" "${date}" "${edited}" "${tags_json}" "${lang_code}" "${authors_json}" "${post_url}" >> posts.json
          done < "$POSTS_META_FILE"

          printf ']' >> posts.json
          echo "Generated posts.json"

      - name: Generate sitemap.xml
        run: |
          BASE_URL="https://www.dohan.in"
          TODAY=$(date -u +"%Y-%m-%d")

          {
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
            printf '%s\n' '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
          } > sitemap.xml

          for html_file in *.html; do
            [ -f "$html_file" ] || continue
            name=$(basename "$html_file" .html)
            if [ "$name" = "index" ]; then
              loc="${BASE_URL}/"
            else
              loc="${BASE_URL}/${name}"
            fi
            {
              printf '%s\n' '  <url>'
              printf '    <loc>%s</loc>\n' "${loc}"
              printf '    <lastmod>%s</lastmod>\n' "${TODAY}"
              printf '%s\n' '  </url>'
            } >> sitemap.xml
          done

          while IFS='|' read -r slug title date edited tags_json lang_code authors_json; do
            post_url="${BASE_URL}/posts?p=${slug}"
            {
              printf '%s\n' '  <url>'
              printf '    <loc>%s</loc>\n' "${post_url}"
              printf '    <lastmod>%s</lastmod>\n' "${edited}"
              printf '%s\n' '  </url>'
            } >> sitemap.xml
          done < "$POSTS_META_FILE"

          printf '%s\n' '</urlset>' >> sitemap.xml
          echo "Generated sitemap.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/ posts.json sitemap.xml
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: pre-render rss, posts.json, sitemap [skip ci]"
          git push
