<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const theme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme);
      const bgColor = theme === "dark" ? "#0d0d0f" : "#fcfcfb";
      document.write(`
      <style id="theme-preloader">
        html { background-color: ${bgColor} !important; }
      </style>
      `);
    </script>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/colors.css" />
    <link rel="stylesheet" href="styles/spacings.css" />
    <link rel="stylesheet" href="styles/typo.css" />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/print.css" media="print" />
    <link rel="alternate" hreflang="ko" href="?lang=ko" />
    <link rel="alternate" hreflang="en" href="?lang=en" />
    <link rel="alternate" hreflang="x-default" href="/" />
    <script src="/languages.js" defer></script>
    <script src="scripts/index.js" defer></script>
    <title data-i18n="head.title">권도한 :: 컴퓨터 공학자</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Dohan Kwon" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="권도한 :: 기록"
      href="/ko/rss.xml"
      hreflang="ko"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Dohan Kwon :: Posts"
      href="/en/rss.xml"
      hreflang="en"
    />
    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body class="noscript">
    <noscript>
      <!-- TODO -->
    </noscript>
    <main>
      <nav class="mt-lg">
        <div>
          <button onclick="window.location.href = '/'">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-house-icon lucide-house"
            >
              <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
              <path
                d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
              />
            </svg>
          </button>
          <button onclick="window.location.href = '/blog'">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-book-text-icon lucide-book-text"
            >
              <path
                d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
              />
              <path d="M8 11h8" />
              <path d="M8 7h6" />
            </svg>
          </button>
        </div>
        <div>
          <button onclick="toggleTheme()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-moon-icon lucide-moon"
            >
              <path
                d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
              />
            </svg>
          </button>
          <button>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-command-icon lucide-command"
            >
              <path
                d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"
              />
            </svg>
          </button>
        </div>
      </nav>
      <header class="mt-lg">
        <div id="profile-image" class="mr-s">
          <source srcset="images/profile.avif" type="image/avif" />
          <source srcset="images/profile.webp" type="image/webp" />
          <img
            src="images/profile.jpg"
            data-i18n="body.profile@alt"
            alt="프로필 사진"
          />
        </div>
        <div class="pt-xs pb-xs" id="profile-info">
          <h1 data-i18n="body.name">권도한</h1>
          <p class="mt-xs">
            <span data-i18n="body.bio">컴퓨터 공학자</span>
            <a
              href="https://mirae.yonsei.ac.kr/wj/index.do"
              data-i18n="body.department,body.department_url@href"
              target="_blank"
              >@연세대학교 미래캠퍼스</a
            >
          </p>
        </div>
      </header>
    </main>
  </body>
</html>
